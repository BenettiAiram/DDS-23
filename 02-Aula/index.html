<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 2</title>
    <link
      rel="icon"
      href="https://cdn-icons-png.flaticon.com/512/5213/5213872.png"/>
  </head>

  <body>
    <h1>TABELA INCRÍVEL</h1>
    <table border="5">
        <!-- cabeçalho da tabela -->
        <thead>
            <tr>
                <th>Nome</th>
                <th>Item</th>
                <th>Quantidade</th>
                <th>Preço</th>
            </tr>
        </thead>
        <!-- corpo da tabela -->
        <tbody>
            <!-- crio uma linha -->
            <tr>
                <!-- crio uma coluna -->
                 <!-- coluna 1 -->
                <td> Cristiano </td>
                <td> Perfume </td>
                <td> 7 </td>
                <td> R$ 777,77 </td>
            </tr>
            <tr>
                <!-- coluna 2 -->
                <td> Neymar </td>
                <td> Ilha em Santos </td>
                <td> 5 </td>
                <td> R$ 17M </td>
            </tr>
            <tr>
                <!-- coluna 3 -->
                <td rowspan="2"> Miguel </td>
                <td> Camisa do Vasco </td>
                <td> 3 </td>
                <td> R$ 900,00 </td>
            </tr>
            <tr>
                <!-- rowspan = mesla linhas da mesma coluna -->
                <td> Foni bluetuf </td>
                <td> 16 </td>
                <td> R$ 500,00 </td>
            </tr>
        </tbody>
        <!-- rodapé da tabela -->
        <tfoot>
            <tr>
                <!-- colspan = mesla colunas da mesma linha -->
                <td colspan="4">&AElig; Todos os direitos reservados &copy;</td>
            </tr>
        </tfoot>
    </table>
  </body>
</html>
