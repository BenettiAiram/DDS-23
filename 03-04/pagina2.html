<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- header = cria um cabeçalho -->
    <header>
        <!-- barra de navegação -->
         <nav>
            <ul>
                <li>Home</li>
                <li>Contato</li>
                <li>Sobre</li>
            </ul>
         </nav>
    </header>
    <!-- main = conteúdo principal do site -->
    <main>
        <!-- section = cria seçções independentes. parece a div, só q c/ significado -->
        <section>
            <article>
                <h2>REPORTAGEM TOP</h2>
            </article>
            <article>
                <h2>NOTÍCIA BOMBÁSTICA</h2>
            </article>
            <article>
                <!-- área que contem imagem -->
                <figure>
                    <img src="https://static0.gamerantimages.com/wordpress/wp-content/uploads/2024/04/hollow-knight-silksong.jpg?w=1600&h=900&fit=crop" alt="Hornet, protagonista de Hollow Knight: Silksong" width="400" height="225">
                    <figcaption>
                        Hornet, protagonista de Hollow Knight: Silksong, que lançou em 2025
                    </figcaption>
                </figure>
            </article>
        </section>
        <!-- aside = área de informações secundária -->
        <aside>
            <h3>BARRA LATERAL CHEIA DE INFFORMAÇÕES RELEVANTES</h3>
        </aside>
    </main>
    <!-- footer = cria um rodapé -->
    <footer><ul>
        <li>MAPA DO SITE</li>
        <li>TRABALHE CONOSCO</li>
    </ul></footer>
</body>
</html>
