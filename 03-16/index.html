<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Trabalhando com posições</h1>

    <!-- div pai estática -->
    <div class="pai" id="pai_estatico">
        <div class="filho" id="filho_estatico"></div>
    </div>
    <!-- div fixa -->
    <div class="pai" id="pai_fixo">
        <div class="filho" id="filho_fixo"></div>
    </div>
    <!-- div grudada -->
    <div class="pai" id="pai_grudado">
        <div class="filho" id="filho_grudado"></div>
    </div>
    <!-- div relativa -->
    <div class="pai" id="pai_relativo">
        <div class="filho" id="filho_relativo"></div>
    </div>
    <!-- div absoluta -->
    <!-- com pai estático -->
    <div class="pai" id="pai_absoluto">
        <div class="filho" id="filho_absoluto"></div>
    </div>
    <!-- com pai não estático-->
    <div class="pai" id="pai_absoluto_relativo">
        <div class="filho" id="filho_absoluto_relativo"></div>
    </div>
</body>
</html>
